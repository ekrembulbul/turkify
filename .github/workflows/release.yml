name: Release

# Elle tetiklenir: Actions sekmesi -> "Release" -> "Run workflow" -> surumu gir (or. 1.3.0).
# Akis: tum dosyalarda surumu guncelle -> commit + tag -> macOS DMG + Windows EXE derle
#       -> GitHub Release olustur (CHANGELOG.md'den notlarla).
#
# On kosul (tek seferlik): repo Secrets'ta macOS imzalama anahtarlari tanimli olmali
#   MACOS_CERT_P12_BASE64, MACOS_CERT_PASSWORD, MACOS_SIGN_IDENTITY,
#   APPLE_API_KEY_P8_BASE64, APPLE_API_KEY_ID, APPLE_API_ISSUER_ID

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Surum (ornek: 1.3.0) — tum dosyalar bu surumle guncellenir"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  # 1) Surumu tum dosyalarda guncelle, commit'le ve tag'le.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Surumu dogrula
        id: v
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Gecersiz surum: '$VERSION' (ornek: 1.3.0)"; exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag zaten var: $TAG (bu surum daha once cikmis)"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Tum dosyalarda surumu guncelle
        run: bash scripts/set_version.sh "${{ steps.v.outputs.version }}"

      - name: Commit + tag + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: surum ${{ steps.v.outputs.version }}"
          git tag -a "${{ steps.v.outputs.tag }}" -m "Turkify ${{ steps.v.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.v.outputs.tag }}"

  # 2) macOS: imzali + notarize edilmis DMG.
  # Proje deployment target'i macOS 13.0 (Ventura+); macos-latest bunu rahat derler.
  macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Imzalama sertifikasini gecici keychain'e al
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/turkify.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          # Gecici keychain'i arama listesine ekle ki codesign kimlikleri bulsun.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/[\" ]//g')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Notarization API anahtarini yaz
        env:
          KEY_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: echo "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: DMG uret (imzala + notarize + staple)
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: bash macos/packaging/build_dmg.sh

      - name: API anahtarini sil
        if: always()
        run: rm -f "$RUNNER_TEMP/AuthKey.p8"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/packaging/dist/*.dmg
          if-no-files-found: error

  # 3) Windows: Inno Setup installer (imzasiz).
  windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Inno Setup kur
        run: choco install innosetup --no-progress -y

      - name: Setup.exe uret
        shell: pwsh
        run: .\windows\packaging\build_all.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/packaging/dist/*.exe
          if-no-files-found: error

  # 4) Iki ciktiyi tek GitHub Release'e topla.
  release:
    needs: [prepare, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release notlarini hazirla (CHANGELOG.md'den)
        id: notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # "## [VERSION]" basligi ile bir sonraki "## [" arasindaki bolumu al.
          SECTION="$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md)"
          if [[ -z "${SECTION//[[:space:]]/}" ]]; then
            echo "CHANGELOG.md icinde [$VERSION] bolumu yok; notlar commit'lerden uretilecek."
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          else
            { echo "## Turkify $VERSION"; echo; echo "$SECTION"; } > notes.md
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release olustur
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          mapfile -t ASSETS < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \))
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::Yuklenecek dosya bulunamadi (DMG/EXE)."; exit 1
          fi
          if [[ "${{ steps.notes.outputs.have_notes }}" == "true" ]]; then
            gh release create "$TAG" "${ASSETS[@]}" --title "Turkify $VERSION" --notes-file notes.md
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "Turkify $VERSION" --generate-notes
          fi
